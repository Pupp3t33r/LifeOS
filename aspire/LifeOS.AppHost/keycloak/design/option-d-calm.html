<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LifeOS — Sign in (Calm · preview)</title>
<!-- Apply stored theme before first paint (no flash); falls through to OS preference. -->
<script>
  (function () {
    try {
      var t = localStorage.getItem("lifeos-theme");
      if (t === "dark" || t === "light") document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* PREVIEW ONLY. Token block below is an inline copy of
     design/themes/calm/bindings/tokens.css so this file opens standalone.
     The live Keycloak theme imports the real (mounted) tokens.css instead. */
  :root {
    --lifeos-bone:        #F4F1EA;
    --lifeos-surface:     #FBFAF6;
    --lifeos-ink:         #2C2A26;
    --lifeos-muted:       #7C766B;
    --lifeos-line:        #E6E1D6;
    --lifeos-sage:        #5E7E6B;
    --lifeos-sage-deep:   #4E6B5A;
    --lifeos-clay:        #C07A52;
    --lifeos-white:       #FFFFFF;
    --lifeos-focus-ring:  rgba(94, 126, 107, 0.22);
    --lifeos-font-display:    "Bricolage Grotesque", sans-serif;
    --lifeos-font-body:       "Spline Sans", sans-serif;
    --lifeos-weight-regular:  400;
    --lifeos-weight-medium:   500;
    --lifeos-weight-semibold: 600;
    --lifeos-weight-bold:     700;
    --lifeos-radius-sm:   14px;
    --lifeos-radius-md:   18px;
    --lifeos-radius-lg:   28px;
    --lifeos-radius-pill: 999px;
    --lifeos-gradient-brand: linear-gradient(150deg, #5E7E6B, #4E6B5A);
    --lifeos-shadow-card:   0 30px 60px -34px rgba(44, 42, 38, 0.40);
    --lifeos-shadow-raised: 0 14px 26px -12px rgba(94, 126, 107, 0.22);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --lifeos-bone:        #15120E;
      --lifeos-surface:     #211C16;
      --lifeos-ink:         #EDE7DC;
      --lifeos-muted:       #9C9384;
      --lifeos-line:        #332D24;
      --lifeos-sage:        #8FB39E;
      --lifeos-sage-deep:   #A7C6B6;
      --lifeos-clay:        #D9966E;
      --lifeos-focus-ring:  rgba(143, 179, 158, 0.32);
      --lifeos-shadow-card: 0 30px 60px -28px rgba(0, 0, 0, 0.62);
    }
  }
  [data-theme="dark"] {
    --lifeos-bone:        #15120E;
    --lifeos-surface:     #211C16;
    --lifeos-ink:         #EDE7DC;
    --lifeos-muted:       #9C9384;
    --lifeos-line:        #332D24;
    --lifeos-sage:        #8FB39E;
    --lifeos-sage-deep:   #A7C6B6;
    --lifeos-clay:        #D9966E;
    --lifeos-focus-ring:  rgba(143, 179, 158, 0.32);
    --lifeos-shadow-card: 0 30px 60px -28px rgba(0, 0, 0, 0.62);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--lifeos-font-body);
    background: var(--lifeos-bone);
    color: var(--lifeos-ink);
    display: grid; place-items: center;
    padding: 1.5rem;
    -webkit-font-smoothing: antialiased;
    position: relative; overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }
  body::before {
    content: ""; position: fixed; inset: -10%;
    pointer-events: none; z-index: 0;
    background:
      radial-gradient(34% 40% at 18% 22%, rgba(94, 126, 107, 0.22), transparent 70%),
      radial-gradient(30% 38% at 84% 78%, rgba(192, 122, 82, 0.18), transparent 70%),
      radial-gradient(40% 50% at 70% 12%, rgba(94, 126, 107, 0.10), transparent 70%);
    filter: blur(8px);
  }

  .card {
    position: relative; z-index: 1;
    width: min(92vw, 396px);
    background: var(--lifeos-surface);
    border: 1px solid var(--lifeos-line);
    border-radius: var(--lifeos-radius-lg);
    padding: 2.6rem 2.2rem 2.3rem;
    box-shadow: var(--lifeos-shadow-card);
    animation: float 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }

  .theme-toggle {
    position: absolute; top: 1rem; right: 1rem;
    width: 36px; height: 36px;
    display: grid; place-items: center;
    border: 1px solid var(--lifeos-line);
    border-radius: var(--lifeos-radius-pill);
    background: transparent; color: var(--lifeos-muted);
    cursor: pointer;
    transition: color 0.3s, border-color 0.3s;
  }
  .theme-toggle:hover { color: var(--lifeos-ink); border-color: var(--lifeos-sage); }
  .theme-toggle svg { width: 18px; height: 18px; }
  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .theme-toggle .icon-sun { display: block; }
    :root:not([data-theme="light"]) .theme-toggle .icon-moon { display: none; }
  }
  [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
  [data-theme="light"] .theme-toggle .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle .icon-moon { display: block; }

  .badge {
    width: 52px; height: 52px;
    border-radius: var(--lifeos-radius-md);
    background: var(--lifeos-gradient-brand);
    display: grid; place-items: center; margin-bottom: 1.6rem;
    font-family: var(--lifeos-font-display);
    font-weight: var(--lifeos-weight-bold); font-size: 1.6rem; color: #fff;
    box-shadow: var(--lifeos-shadow-raised);
  }

  h1 { font-family: var(--lifeos-font-display); font-weight: var(--lifeos-weight-bold);
       font-size: 1.95rem; letter-spacing: -0.02em; line-height: 1.05; margin-bottom: 0.5rem; }
  .sub { color: var(--lifeos-muted); font-size: 0.95rem; margin-bottom: 1.9rem; line-height: 1.45; }

  .field { margin-bottom: 1.05rem; }
  .field label { display: block; font-size: 0.78rem; font-weight: var(--lifeos-weight-medium); color: var(--lifeos-muted); margin-bottom: 0.4rem; }
  .field input {
    width: 100%; font-family: inherit; font-size: 0.97rem; color: var(--lifeos-ink);
    background: var(--lifeos-bone);
    border: 1.5px solid var(--lifeos-line); border-radius: var(--lifeos-radius-sm);
    padding: 0.85rem 1rem; outline: none;
    transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
  }
  .field input:focus { border-color: var(--lifeos-sage); background: var(--lifeos-surface); box-shadow: 0 0 0 4px var(--lifeos-focus-ring); }

  .row { display: flex; justify-content: space-between; align-items: center; margin: 0.4rem 0 1.5rem; font-size: 0.86rem; }
  .row a { color: var(--lifeos-sage-deep); text-decoration: none; font-weight: var(--lifeos-weight-medium); }
  .row a:hover { text-decoration: underline; }
  .check { display: flex; align-items: center; gap: 0.5rem; color: var(--lifeos-muted); cursor: pointer; user-select: none; }
  .check input { accent-color: var(--lifeos-sage); width: 16px; height: 16px; }

  .btn {
    width: 100%; cursor: pointer; border: none;
    background: var(--lifeos-gradient-brand); color: #fff; font-family: inherit;
    font-weight: var(--lifeos-weight-semibold); font-size: 0.97rem;
    padding: 0.95rem; border-radius: var(--lifeos-radius-sm);
    box-shadow: var(--lifeos-shadow-raised);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  .div { display: flex; align-items: center; gap: 0.9rem; margin: 1.5rem 0 1.2rem; color: var(--lifeos-muted); font-size: 0.82rem; }
  .div::before, .div::after { content: ""; flex: 1; height: 1px; background: var(--lifeos-line); }

  .social {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    background: var(--lifeos-surface); border: 1.5px solid var(--lifeos-line);
    border-radius: var(--lifeos-radius-sm); color: var(--lifeos-ink);
    font-family: inherit; font-weight: var(--lifeos-weight-medium); font-size: 0.92rem;
    padding: 0.85rem; cursor: pointer; text-decoration: none;
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
  }
  .social:hover { border-color: var(--lifeos-sage); transform: translateY(-1px); box-shadow: var(--lifeos-shadow-raised); }

  .foot { margin-top: 1.7rem; text-align: center; font-size: 0.9rem; color: var(--lifeos-muted); }
  .foot a { color: var(--lifeos-sage-deep); font-weight: var(--lifeos-weight-semibold); text-decoration: none; }

  @keyframes float { from { transform: translateY(18px) scale(0.98); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .card { animation: none; } }
</style>
</head>
<body>
  <div class="card">
    <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    </button>
    <div class="badge">L</div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to LifeOS, one calm place for everything you keep.</p>

    <form action="#" method="post">
      <div class="field">
        <label for="u">Username or email</label>
        <input type="text" id="u" autocomplete="username" autofocus />
      </div>
      <div class="field">
        <label for="p">Password</label>
        <input type="password" id="p" autocomplete="current-password" />
      </div>
      <div class="row">
        <label class="check"><input type="checkbox" /> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>
      <button class="btn" type="submit">Sign in</button>
    </form>

    <div class="div">or</div>
    <a href="#" class="social">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62Z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18Z"/>
        <path fill="#FBBC05" d="M3.97 10.72A5.41 5.41 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.95H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.05l3.01-2.33Z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58Z"/>
      </svg>
      Continue with Google
    </a>
    <p class="foot">New here? <a href="#">Create an account</a></p>
  </div>

  <script>
    (function () {
      var btn = document.getElementById("theme-toggle");
      if (!btn) return;
      var root = document.documentElement;
      function resolved() {
        var attr = root.getAttribute("data-theme");
        if (attr === "dark" || attr === "light") return attr;
        return (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
      }
      function apply(mode) {
        root.setAttribute("data-theme", mode);
        try { localStorage.setItem("lifeos-theme", mode); } catch (e) {}
        btn.setAttribute("aria-pressed", String(mode === "dark"));
      }
      btn.setAttribute("aria-pressed", String(resolved() === "dark"));
      btn.addEventListener("click", function () { apply(resolved() === "dark" ? "light" : "dark"); });
    })();
  </script>
</body>
</html>
